name: Build Quran App APK

on:
  push:
    branches: [ main, claude/check-missing-items-4JdPM ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Download ur-roman translation (Maududi Roman Urdu from fawazahmed0)
        run: python3 scripts/download_ur_roman.py
      - name: Download all 46 bundled translations (alquran.cloud)
        run: python3 scripts/download_all_translations.py
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.buildMode=debug" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: quran-kareem-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
